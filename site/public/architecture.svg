<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" style="background:transparent">
  <defs>
    <linearGradient id="frontend-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(6,78,59,0.3)"></stop>
      <stop offset="100%" stop-color="rgba(6,78,59,0.5)"></stop>
    </linearGradient>
    <linearGradient id="backend-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(8,51,68,0.3)"></stop>
      <stop offset="100%" stop-color="rgba(8,51,68,0.5)"></stop>
    </linearGradient>
    <linearGradient id="data-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(76,29,149,0.3)"></stop>
      <stop offset="100%" stop-color="rgba(76,29,149,0.5)"></stop>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#34343a"></path>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background grid -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a1a1e" stroke-width="0.5"></path>
  </pattern>
  <rect width="800" height="420" fill="url(#grid)"></rect>

  <!-- Layer labels -->
  <text x="40" y="50" fill="#8a8f98" font-family="Inter, sans-serif" font-size="11" font-weight="500" letter-spacing="1">FRONTEND</text>
  <text x="40" y="180" fill="#8a8f98" font-family="Inter, sans-serif" font-size="11" font-weight="500" letter-spacing="1">BACKEND</text>
  <text x="40" y="360" fill="#8a8f98" font-family="Inter, sans-serif" font-size="11" font-weight="500" letter-spacing="1">DATA</text>

  <!-- Arrows -->
  <line x1="400" y1="85" x2="400" y2="110" stroke="#34343a" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"></line>
  <line x1="400" y1="280" x2="400" y2="310" stroke="#34343a" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"></line>

  <!-- Arrow labels -->
  <text x="415" y="100" fill="#62666d" font-family="Inter, sans-serif" font-size="9">HTTP /api/*</text>
  <text x="415" y="298" fill="#62666d" font-family="Inter, sans-serif" font-size="9">SQL</text>

  <!-- Frontend -->
  <rect x="180" y="30" width="440" height="60" rx="8" fill="url(#frontend-grad)" stroke="#10b981" stroke-width="1.5"></rect>
  <text x="400" y="58" fill="#10b981" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Frontend (SvelteKit SPA)</text>
  <text x="400" y="76" fill="#8a8f98" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Emerald theme · Tailwind CSS · Lucide Icons</text>

  <!-- Backend boundary -->
  <rect x="100" y="120" width="600" height="160" rx="12" fill="none" stroke="#23252a" stroke-width="1" stroke-dasharray="6,3"></rect>

  <!-- Backend modules - Row 1 -->
  <rect x="120" y="138" width="115" height="44" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"></rect>
  <text x="177" y="155" fill="#34d399" font-family="Inter, sans-serif" font-size="10" font-weight="500" text-anchor="middle">Auth &amp; 2FA</text>
  <text x="177" y="170" fill="#8a8f98" font-family="Inter, sans-serif" font-size="8" text-anchor="middle">JWT · TOTP · RBAC</text>

  <rect x="250" y="138" width="115" height="44" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"></rect>
  <text x="307" y="155" fill="#34d399" font-family="Inter, sans-serif" font-size="10" font-weight="500" text-anchor="middle">Infrastructure</text>
  <text x="307" y="170" fill="#8a8f98" font-family="Inter, sans-serif" font-size="8" text-anchor="middle">Servers · SSH · Groups</text>

  <rect x="380" y="138" width="115" height="44" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"></rect>
  <text x="437" y="155" fill="#34d399" font-family="Inter, sans-serif" font-size="10" font-weight="500" text-anchor="middle">Containers</text>
  <text x="437" y="170" fill="#8a8f98" font-family="Inter, sans-serif" font-size="8" text-anchor="middle">Docker · Stats · Scan</text>

  <rect x="510" y="138" width="115" height="44" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"></rect>
  <text x="567" y="155" fill="#34d399" font-family="Inter, sans-serif" font-size="10" font-weight="500" text-anchor="middle">Registry</text>
  <text x="567" y="170" fill="#8a8f98" font-family="Inter, sans-serif" font-size="8" text-anchor="middle">Zot · Webhooks · Tags</text>

  <!-- Backend modules - Row 2 -->
  <rect x="120" y="196" width="115" height="44" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"></rect>
  <text x="177" y="213" fill="#34d399" font-family="Inter, sans-serif" font-size="10" font-weight="500" text-anchor="middle">SSH Keys</text>
  <text x="177" y="228" fill="#8a8f98" font-family="Inter, sans-serif" font-size="8" text-anchor="middle">ED25519 · RSA · Groups</text>

  <rect x="250" y="196" width="115" height="44" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"></rect>
  <text x="307" y="213" fill="#34d399" font-family="Inter, sans-serif" font-size="10" font-weight="500" text-anchor="middle">Compliance</text>
  <text x="307" y="228" fill="#8a8f98" font-family="Inter, sans-serif" font-size="8" text-anchor="middle">CIS · Lynis · Scan</text>

  <rect x="380" y="196" width="115" height="44" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"></rect>
  <text x="437" y="213" fill="#34d399" font-family="Inter, sans-serif" font-size="10" font-weight="500" text-anchor="middle">Monitoring</text>
  <text x="437" y="228" fill="#8a8f98" font-family="Inter, sans-serif" font-size="8" text-anchor="middle">SSL · Uptime · Alert</text>

  <rect x="510" y="196" width="115" height="44" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"></rect>
  <text x="567" y="213" fill="#34d399" font-family="Inter, sans-serif" font-size="10" font-weight="500" text-anchor="middle">Audit &amp; Security</text>
  <text x="567" y="228" fill="#8a8f98" font-family="Inter, sans-serif" font-size="8" text-anchor="middle">Login · Lockout · Audit</text>

  <!-- Backend footer -->
  <rect x="120" y="254" width="505" height="16" rx="3" fill="rgba(6,78,59,0.15)" stroke="none"></rect>
  <text x="372" y="266" fill="#8a8f98" font-family="Inter, sans-serif" font-size="8" text-anchor="middle">Go 1.25 · Chi Router · pgx · Modular Monolith Pattern</text>

  <!-- Data layer -->
  <rect x="120" y="320" width="245" height="52" rx="8" fill="url(#data-grad)" stroke="#a78bfa" stroke-width="1.5"></rect>
  <text x="242" y="344" fill="#a78bfa" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Postgresql</text>
  <text x="242" y="360" fill="#8a8f98" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">Persistent Data · Migrations</text>

  <rect x="380" y="320" width="245" height="52" rx="8" fill="url(#data-grad)" stroke="#a78bfa" stroke-width="1.5"></rect>
  <text x="502" y="344" fill="#a78bfa" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">REDis</text>
  <text x="502" y="360" fill="#8a8f98" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">Sessions · Cache · Rate Limiting</text>

  <!-- Legend -->
  <rect x="650" y="320" width="110" height="52" rx="6" fill="#18191a" stroke="#23252a" stroke-width="1"></rect>
  <rect x="658" y="330" width="8" height="8" rx="2" fill="#34d399"></rect>
  <text x="672" y="338" fill="#8a8f98" font-family="Inter, sans-serif" font-size="9">Go Backend</text>
  <rect x="658" y="346" width="8" height="8" rx="2" fill="#a78bfa"></rect>
  <text x="672" y="354" fill="#8a8f98" font-family="Inter, sans-serif" font-size="9">Data Stores</text>
  <rect x="658" y="362" width="8" height="8" rx="2" fill="#10b981"></rect>
  <text x="672" y="370" fill="#8a8f98" font-family="Inter, sans-serif" font-size="9">Svelte Frontend</text>
</svg>
