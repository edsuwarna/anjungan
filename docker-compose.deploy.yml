# ─── Docker Compose untuk Anjungan — Client Deployment ────────────────────
# Usage: docker compose -f docker-compose.deploy.yml up -d
#
# Prerequisites:
#   1. Create external network: docker network create proxy-net
#   2. Copy .env.example → .env, edit JWT_SECRET + POSTGRES_PASSWORD
#   3. Docker socket mounted for container monitoring

services:
  postgres:
    image: postgres:17-alpine
    container_name: anjungan-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anjungan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anjungan}
      POSTGRES_DB: ${POSTGRES_DB:-anjungan}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anjungan}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - anjungan-net

  redis:
    image: redis:7-alpine
    container_name: anjungan-redis
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - anjungan-net

  backend:
    image: ghcr.io/edsuwarna/anjungan/anjungan-backend:main-latest
    container_name: anjungan-backend
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - sshkeys:/data/ssh
      - /var/run/docker.sock:/var/run/docker.sock:rw
    restart: unless-stopped
    networks:
      - anjungan-net

  frontend:
    image: ghcr.io/edsuwarna/anjungan/anjungan-frontend:main-latest
    container_name: anjungan-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - anjungan-net
      - proxy-net

volumes:
  pgdata:
  redisdata:
  sshkeys:

networks:
  anjungan-net:
    driver: bridge
  proxy-net:
    external: true
