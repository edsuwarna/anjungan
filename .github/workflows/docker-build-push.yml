name: Build & Push Docker Images to Zot Registry

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY_URL: registry.edsuwarna.xyz
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            dockerfile: Dockerfile.backend
            context: ./backend
          - name: frontend
            dockerfile: Dockerfile.frontend
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Zot Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_URL }}/anjungan-${{ matrix.service.name }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=release-latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=main-latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels:
            org.opencontainers.image.title=Anjungan ${{ matrix.service.name == 'backend' && 'Backend' || 'Frontend' }}
            org.opencontainers.image.description=${{ matrix.service.name == 'backend' && 'Backend service for Anjungan IDP platform' || 'Web frontend for Anjungan IDP platform' }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Edsuwarna
            org.opencontainers.image.source=https://github.com/edsuwarna/anjungan
            org.opencontainers.image.url=https://github.com/edsuwarna/anjungan
            org.opencontainers.image.version=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
