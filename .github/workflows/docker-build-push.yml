name: Build & Push Docker Images to Zot Registry

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY_URL: registry.edsuwarna.xyz

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            dockerfile: Dockerfile.backend
            context: ./backend
          - name: frontend
            dockerfile: Dockerfile.frontend
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Zot Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_NAME="${REGISTRY_URL}/anjungan-${{ matrix.service.name }}"

          # If triggered by a git tag (v*), use version-based tags
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"  # strip leading 'v'
            TAGS="${IMAGE_NAME}:${VERSION},${IMAGE_NAME}:${SHORT_SHA}"
          else
            # Push to main branch: latest + sha
            TAGS="${IMAGE_NAME}:latest,${IMAGE_NAME}:${SHORT_SHA}"
          fi

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
