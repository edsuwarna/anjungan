name: Build & Push Docker Images to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            dockerfile: Dockerfile.backend
            context: ./backend
          - name: frontend
            dockerfile: Dockerfile.frontend
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata (tags only)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/anjungan-${{ matrix.service.name }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=release-latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=main-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push with Annotations
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Anjungan ${{ matrix.service.name == 'backend' && 'Backend' || 'Frontend' }}
            org.opencontainers.image.description=${{ matrix.service.name == 'backend' && 'Backend service for Anjungan IDP platform' || 'Web frontend for Anjungan IDP platform' }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=Edsuwarna
            org.opencontainers.image.source=https://github.com/edsuwarna/anjungan
            org.opencontainers.image.url=https://github.com/edsuwarna/anjungan
          annotations: |
            org.opencontainers.image.title=Anjungan ${{ matrix.service.name == 'backend' && 'Backend' || 'Frontend' }}
            org.opencontainers.image.description=${{ matrix.service.name == 'backend' && 'Backend service for Anjungan IDP platform' || 'Web frontend for Anjungan IDP platform' }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=Edsuwarna
            org.opencontainers.image.source=https://github.com/edsuwarna/anjungan
            org.opencontainers.image.url=https://github.com/edsuwarna/anjungan
            org.opencontainers.image.version=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
